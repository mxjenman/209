<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>激活码管理后台</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:20px}
button{padding:10px 16px;border:none;border-radius:10px;background:#000;color:#fff}
input{padding:10px;border-radius:10px;border:1px solid #ccc;width:80px}
table{width:100%;border-collapse:collapse;margin-top:15px}
td,th{padding:8px;border-bottom:1px solid #ddd;font-size:14px;text-align:left}
</style>
</head>

<body>

<h2>🔐 激活码管理后台</h2>

<div class="card">

生成数量：
<input id="count" type="number" value="5">

<button onclick="generate()">生成激活码</button>

</div>

<div class="card">
<h3>激活码列表</h3>

<table>
<thead>
<tr>
<th>激活码</th>
<th>是否使用</th>
<th>设备ID</th>
<th>操作</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>

</div>

<script>
let db = JSON.parse(localStorage.getItem("codes") || "{}");

function save(){
    localStorage.setItem("codes", JSON.stringify(db));
}

function randomCode(){
    return "ACT-" + Math.random().toString(36).substr(2,8).toUpperCase();
}

function generate(){
    let n = Number(document.getElementById("count").value);

    if (!n || n < 1) {
        alert("请输入正确的生成数量");
        return;
    }

    for(let i = 0; i < n; i++){
        let code = randomCode();

        while (db[code]) {
            code = randomCode();
        }

        db[code] = {
            used: false,
            usedAt: "",
            usedDevice: "",
            useCount: 0
        };
    }

    save();
    render();
    alert("激活码生成成功！");
}

function render(){
    let html = "";

    for(let code in db){
        html += `
        <tr>
            <td>${code}</td>
            <td>${db[code].used ? "已使用" : "未使用"}</td>
            <td>${db[code].usedDevice || "-"}</td>
            <td>
                <button style="background:#28a745; margin-right:5px;" onclick="copyCode('${code}')">复制</button>
                <button style="background:#007bff; margin-right:5px;" onclick="resetCode('${code}')">重置</button>
                <button style="background:#dc3545;" onclick="deleteCode('${code}')">删除</button>
            </td>
        </tr>
        `;
    }

    document.getElementById("list").innerHTML = html;
}

render();

function copyCode(code) {
    navigator.clipboard.writeText(code).then(() => {
        alert("激活码已复制到剪贴板：" + code);
    }).catch(() => {
        alert("复制失败，请手动复制");
    });
}

function resetCode(code) {
    if(confirm("确定要把这个激活码恢复成未使用吗？")) {
        db[code] = {
            used: false,
            usedAt: "",
            usedDevice: "",
            useCount: 0
        };
        save();
        render();
        alert("已重置为未使用");
    }
}

function deleteCode(code) {
    if(confirm("确定要删除这个激活码吗？删除后将无法使用。")) {
        delete db[code];
        save();
        render();
    }
}
</script>

</body>
</html>
